<!doctype html>
<html lang="ko">
    <head>
        <title> 뭐든 팝니다 </title>

        <!-- Required meta tags -->
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

        <!-- Bootstrap CSS -->
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
              integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
              crossorigin="anonymous">

        <!-- JS -->
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"
                integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q"
                crossorigin="anonymous"></script>

        <link href="https://fonts.googleapis.com/css2?family=Gamja+Flower&display=swap" rel="stylesheet">

        <style>
            * {
                font-family: 'Gamja Flower', cursive;
            }

            .wrap {
                width: 500px;
                margin: auto;
            }

            .image {
                width: 500px;
                height: 300px;
                margin-bottom: 10px;
                background-image: url("https://www.futurekorea.co.kr/news/photo/201905/117278_117782_513.jpg");
                background-position: center;
                background-size: cover;
            }

            .small {
                font-size: 15px;
            }

            .input {
                width: 500px;
            }

            .button {
                margin: auto;
                display: block;
            }
            .rate {
                color: blue;
            }
        </style>
    </head>
    <script>
        $.ajax({
            type: "GET",
            url: "https://api.manana.kr/exchange/rate.json",
            data: {},
            success: function (response) {
                let nowrate=(response[1]['rate']);
                $('#rate-box').text(nowrate)
            }
        })

        function order() {
            let name = $('#order-name').val();
            let count = $('#order-count').val();
            let address = $('#order-address').val();
            let phone = $('#order-phone').val();

            if (name == '') {
                alert('이름을 입력하세요')
            } else if (count == '수량을 선택하세요') {
                alert('수량을 입력하세요')
            } else if (address == '') {
                alert('주소를 입력하세요')
            } else if (phone == '') {
                alert('번호를 입력하세요')
            } else {
                alert('주문이 완료되었습니다')
            }

        }
    </script>
    <body>
        <div class="wrap">
            <div class="image"></div>
            <h1> 마법의 향수 <span class="small">가격: 50,000원/개 </span></h1>
            <p>
                이 향수는 마법의 향수입니다. 향을 맡는 사람들은 모두 기분이 아주 좋아져요.
            </p>
            <p  class="rate">
                달러-원 환율: <span id="rate-box">1,000</span>
            </p>
            <div class="input">
                <div class="input-group mb-3">
                    <div class="input-group-prepend">
                        <span class="input-group-text" id="inputGroup-sizing-default">주문자 이름</span>
                    </div>
                    <input id="order-name" type="text" class="form-control" aria-label="Default"
                           aria-describedby="inputGroup-sizing-default">
                </div>
                <div class="input-group mb-3">
                    <div class="input-group-prepend">
                        <label class="input-group-text" for="inputGroupSelect01">수량</label>
                    </div>
                    <select class="custom-select" id="order-count">
                        <option selected> 수량을 선택하세요</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                    </select>
                </div>
                <div class="input-group mb-3">
                    <div class="input-group-prepend">
                        <span class="input-group-text" id="inputGroup-sizing-default">주소</span>
                    </div>
                    <input id="order-address" type="text" class="form-control" aria-label="Default"
                           aria-describedby="inputGroup-sizing-default">
                </div>
                <div class="input-group mb-3">
                    <div class="input-group-prepend">
                        <span class="input-group-text" id="inputGroup-sizing-default">전화번호</span>
                    </div>
                    <input id="order-phone" type="text" class="form-control" aria-label="Default"
                           aria-describedby="inputGroup-sizing-default">
                </div>
            </div>
            <div>
                <button onclick="order()" type="button" class="btn btn-primary button">주문하기</button>
            </div>

        </div>
    </body>
</html>
